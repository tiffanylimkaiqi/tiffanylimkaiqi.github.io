<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body {
        background-color: rgb(175, 244, 198);
    }

    h1 {
        color: rgb(0, 0, 255);
        font-family: Arial, sans-serif;
        text-align: center;
        text-decoration: underline;
        font-size: 50px;
    }

    h1.nounderline {
        text-decoration: none;
        font-size: 40px;
    }

    p {
        color: rgb(211, 20, 201);
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        font-size: 20px;
        background-color: rgb(255, 255, 0);
        padding: 10px;
        border-radius: 15px;
        border: 2px dashed rgb(255, 6, 6);
        margin: 20px;
    }

    img {
        display: block;
        margin: auto;
        /* Centers the image */
    }
</style>

<body>
    <h1>Hello, World!</h1>
    <h1 class="nounderline">Kachow.</h1>
    <img src="images/Glaive - insta.jpg" alt="Glaive" width="200" height="200">
    <p>Wassup.</p>
</body>

</html>
