<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1 - Button</title>
</head>

<style>
    button {
        margin: 10px 5px;
        font-size: 15px;
        border: none;
    }

    .black {
        background-color: black;
        color: white;
        padding: 10px 20px;
        font-size: 14px;
    }

    .green {
        background-color: rgb(86, 164, 89);
        color: white;
        padding: 10px 25px;
        border-radius: 6px;
        font-weight: bold;
    }

    .yellow {
        background-color: rgb(249, 218, 78);
        color: black;
        padding: 7px 50px;
        border-radius: 30px;
    }

    .purple {
        background-color: rgb(115, 84, 173);
        color: white;
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
    }

    .whitegrey {
        background-color: white;
        color: rgb(121, 125, 131);
        padding: 10px 20px;
        border-radius: 4px;
        border: 1px solid rgb(121, 125, 131);
        font-weight: bold;
        font-size: 14px;
    }

    .blue {
        background-color: rgb(45, 101, 188);
        color: white;
        padding: 10px 20px;
        border-radius: 50px;
        font-weight: bold;
    }

    .whiteblue {
        background-color: white;
        color: rgb(45, 101, 188);
        padding: 10px 22px;
        border-radius: 50px;
        font-weight: bold;
        border: 1px solid rgb(45, 101, 188);
    }
</style>

<body>
    <button class="black">Request now</button>
    <button class="green">Sign Up</button>
    <button class="yellow">Add to Cart</button><br>
    <button class="purple">Get started</button>
    <button class="whitegrey">Download</button>
    <button class="blue">Apply on company website</button>
    <button class="whiteblue">Save</button>
</body>

</html>
