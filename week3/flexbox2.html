<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox 2</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Space Grotesk', sans-serif;
    }

    body {
        background-color: #ffffff;
        color: #000000;
    }

    .container {
        max-width: 1440px;
        margin: 20px auto;
        padding: 0px 30px;
    }


    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 36px;
        font-weight: bolder;
    }

    .nav-links {
        display: flex;
        gap: 30px;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 32px;
    }

    .nav-links a {
        text-decoration: none;
        color: #191a23;
        font-weight: 500;
        font-size: 20px;
    }

    .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px 0;
        gap: 40px;
    }

    .hero-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 25px;
    }

    .hero-content h1 {
        font-size: 60px;
        line-height: 1.2;
        font-weight: 600;
    }

    .hero-content p {
        font-size: 18px;
        color: #191a23;
        line-height: 1.5;
    }


    .hero-image {
        flex: 1;
        display: flex;
        justify-content: center;
    }

    .hero-image img {
        max-width: 80%;
        height: auto;
    }

    .logo-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;

        gap: 10px;
        padding-top: 10px;
        filter: grayscale(100%);

        opacity: 0.8;
    }

    .logo-bar img {
        max-height: 45px;
        object-fit: contain;
    }


    button {
        cursor: pointer;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.2s ease;
    }

    .btn-secondary {
        background: transparent;
        border: 1px solid #191a23;
        padding: 14px 28px;
        font-size: 18px;
    }

    .btn-primary {
        background-color: #191a23;
        color: #ffffff;
        border: none;
        padding: 18px 35px;
    }
</style>

<body>

    <div class="container">

        <header class="navbar">
            <div class="logo">
                <img src="images/Icon.png" height="25px" width="auto">
                Positivus
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="#">About us</a>
                    <a href="#">Services</a>
                    <a href="#">Use Cases</a>
                    <a href="#">Pricing</a>
                    <a href="#">Blog</a>
                </div>

                <button class="btn-secondary">Request a quote</button>
            </div>
        </header>

        <main class="hero">
            <div class="hero-content">
                <h1>Navigating the digital landscape for success</h1>
                <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including SEO, PPC, social media marketing, and content creation.</p>
                <button class="btn-primary">Book a consultation</button>
            </div>

            <div class="hero-image">
                <img src="images/Illustration.jpg" alt="Marketing Illustration">
            </div>
        </main>

        <div class="logo-bar img">
            <img src="images/amazon.png">
            <img src="images/dripple.png">
            <img src="images/hubspace.png">
            <img src="images/notion.png">
            <img src="images/netlifx.png">
            <img src="images/zoom.png">
        </div>
    </div>
</body>

</html>
