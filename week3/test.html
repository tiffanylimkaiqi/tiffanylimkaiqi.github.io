<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');

    .test {
        color: blue;
        font-size: 20px;
        background-color: lightgray;
        font-family: 'Roboto Mono', monospace;
    }

    .test2 {
        color: red;
        font-size: 18px;
        background-color: lightyellow;
        font-family: 'Roboto Mono', monospace;
    }

    .space {
        padding: 0.5em;
        margin: 0.5em;
    }

    .container {
        display: flex;
        background-color: lightblue;
        color: darkblue;
        gap: 15px;
        justify-content: space-evenly;
        align-items: center;
        padding: 0.3em;
    }
</style>

<body>
    <div class="test space">
        <h1>Test</h1>
        <p>This is a test.</p>
    </div>
    <div class="test2 space">
        <h1>Test 2</h1>
        <p>This is a second test.</p>
    </div>

    <h1>Test 3</h1>
    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
    </div>
</body>
